name: "Auto News Pipeline"

on:
  schedule:
    # Run every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    # Allow manual triggers from GitHub UI

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🚀 Run news pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/main.py

      - name: 💾 Save posted titles state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f scripts/posted_titles.json ]; then
            git add scripts/posted_titles.json
            git diff --cached --quiet || git commit -m "chore: update posted titles [skip ci]"
            git push
          fi
